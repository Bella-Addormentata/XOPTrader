- name: wmilliETH/XCH
  base_asset_id: 4cb15a8ecc85068fb1f98c09a5e489d1ad61b2af79690ce00f9fc4803c8b597f
  quote_asset_id: xch
  enabled: false
strategy:
  gamma: 0.005
  kappa: 1.5
  phi: 0.8                           # Raised from 0.5 -- aggressive rebalancing skew for extreme inventory imbalance
  q_max: 30                           # [v0.7.39] Raised from 8 for ~10 XCH outermost tier. Wallet cap (v0.7.38) protects ask side.
  min_profit_margin_bps: 35
  max_half_spread_bps: 150
  high_vol_multiplier: 1.3
  offer_ttl_blocks: 600           # ~5 hours; reduces cancel+repost churn
  num_tiers: 4                        # [v0.7.39] Reduced from 6: fewer, larger tiers -- each fill buys more XCH
  tier_spacing_bps:
  - 35.0
  - 100.0
  - 200.0
  - 300.0
  tier_size_pct:                      # Fallback when adverse-selection sizing is off
  - 0.15
  - 0.20
  - 0.30
  - 0.35
  startup_analysis_blocks: 5
  fee_reserve_xch: 0.1
  fee_min_spendable_xch: 0.01
  taker_min_spendable_xch: 0.25
  block_time_seconds: 52.0
  min_spendable_reserve_pct: 0.05   # Lowered so bids recover sooner when coins are mostly locked, not truly depleted
  arb_reserve_coins: 2            # Dry-powder: keep 2 coins unallocated for arb takes
  min_reserve_units: 0.1
  min_offer_size_units: 0.1       # Minimum offer size per tier (XCH units); default was 1.0
  min_trading_units: 0.1          # Lowered from 0.5: unblocks ask-side when XCH > 0.1
  auto_rebalance_enabled: true
  xch_ask_throttle_enabled: true
  xch_ask_throttle_caution_xch: 2.0
  xch_ask_throttle_low_xch: 1.0
  xch_ask_throttle_critical_xch: 0.35
  xch_ask_throttle_aggressiveness: 1.15
  sigma_floor: 0.001              # Minimum annualized sigma — prevents degenerate GLFT when Yang-Zhang returns 0

  # Coin pool: pre-split XCH into smaller coins for concurrent offers
  coin_pool_target_count: 3       # Fits ~2 XCH spendable balance
  coin_pool_target_xch: 0.5       # Each coin ~0.5 XCH (3×0.5=1.5 XCH)
  coin_pool_interval_blocks: 5    # Check every ~4.3 minutes

  # CAT coin pool: pre-split BYC, wUSDC.b etc. for concurrent offers
  cat_coin_pool_target_count: 0   # Disabled until CAT inventory recovers
  cat_coin_pool_target_units: 10.0  # Each coin ~10 display units (10 BYC, 10 USDC etc.)

  wall_size_threshold_xch: 50.0
  wall_niche_premium_pct: 0.05

  # Competitive anchor pricing -- anchor tiers to best competing offer
  competitive_anchor_enabled: true       # [v0.7.41] Anchor T0 to best competitor
  competitive_anchor_max_distance_bps: 500.0  # Max anchor distance from mid
  competitive_anchor_stride_bps: 65.0    # Inter-tier spacing from anchor point

  # Smart orphan management (Guéant-Lehalle 2013, Gao-Wang 2020)
  orphan_adopt_enabled: true
  orphan_adverse_threshold: 0.02
  orphan_max_adopt_age_blocks: 120
  orphan_inventory_bonus: 0.01

  # Cross-pair correlated inventory skewing (Guéant 2019)
  cross_pair_skew_enabled: true
  cross_pair_skew_phi: 0.50          # Raised from 0.30 -- stronger coordinated cross-pair rebalancing

  # PID adaptive spread controller -- tightens when offers don't fill,
  # widens when fills become frequent.  Per-pair feedback loop.
  pid_spread_enabled: true
  pid_target_fill_rate: 0.10         # Target: fill on ~10% of blocks (~1 per 9 min)
  pid_kp: 0.8                        # Proportional gain
  pid_ki: 0.05                       # Integral gain
  pid_kd: 0.2                        # Derivative gain
  pid_ema_alpha: 0.02                # EMA smoothing (lower = smoother, ~50 block window)
  pid_min_mult: 0.70                 # Max tightening: 30%
  pid_max_mult: 1.30                 # Max widening: 30%
  pid_warmup_blocks: 50              # Observe for ~43 min before adjusting
risk:
  soft_limit_pct: 0.6
  hard_limit_pct: 0.8
  single_cat_cap_pct: 0.12
  kelly_fraction: 0.5
  max_capital_per_pair_pct: 0.85  # Raised from 0.40 -- wUSDC.b dominates portfolio (77%), XCH/wUSDC.b pair needs >40% to trade
  max_drawdown_pct: 0.05
  loss_window_blocks: 576
  max_window_loss_bps: 250

  # Circuit-breaker auto-rebalance (enables loss manager for stuck positions)
  circuit_breaker_enabled: true
  circuit_breaker_hard_limit_ratio: 0.80
  circuit_breaker_age_multiplier: 2.0
  circuit_breaker_max_loss_bps: 100
volatility:
  lookback_blocks: 200
  yz_alpha: 0.34
  candle_aggregation_blocks: 10
monitoring:
  prometheus_port: 19090
depeg:
  enabled: true
  default_warn_pct: 2.0
  default_bail_pct: 10.0
  default_sustained_blocks: 30
  auto_disable_pair: true
  alert_on_warn: true
  alert_on_bail: true
arbitrage:
  enabled: true
  triangular_min_profit_bps: 12
  triangular_slippage_bps: 10
  triangular_per_leg_fee_bps: 5
  cex_dex_min_edge_bps: 50
  cex_dex_max_edge_bps: 500
  cex_fee_bps: 10
  cex_reference_half_spread_bps: 10
  cross_dex_min_edge_bps: 15
  tibetswap_fee_bps: 70
  cross_bridge_min_edge_bps: 20
  bridge_cost_bps: 15
  crossed_book_enabled: true
  crossed_book_min_edge_bps: 10
  crossed_book_max_take_xch: 5.0
  cancel_worst_to_free: true       # Cancel worst offer to free coin for arb
  midpoint_recycling_enabled: true
  midpoint_recycling_pairs: ["XCH/wUSDC.b"]
  midpoint_recycling_band_bps: 20
  midpoint_recycling_min_take_xch: 0.10
  midpoint_recycling_max_take_xch: 0.25
  midpoint_recycling_cooldown_blocks: 4
  midpoint_recycling_max_takes_per_block: 1
  midpoint_recycling_daily_take_xch_cap: 1.0
  midpoint_recycling_epoch_blocks: 4608
  midpoint_recycling_min_expected_edge_bps: 5
  midpoint_recycling_fee_buffer_bps: 2
  midpoint_recycling_toxicity_buffer_bps: 6
  midpoint_recycling_slippage_buffer_bps: 2
  midpoint_recycling_inventory_ratio_cap: 0.60
  midpoint_recycling_require_cex_ref: true
  midpoint_recycling_max_cex_age_blocks: 10
  midpoint_recycling_vpin_max: 0.70
  cross_stable_arb_enabled: true
  cross_stable_min_edge_bps: 15
  cross_stable_max_take_xch: 5.0
  peg_arb_enabled: true
  peg_arb_min_edge_bps: 5
  peg_arb_max_take_units: 50
  peg_arb_max_inventory_ratio: 0.60  # suppress takes beyond 60:40 balance
  max_position_size: 100
  default_confidence: 0.75
  min_confidence_threshold: 0.4
coingecko:
  enabled: true
  coin_ids:
  - chia
  - ethereum
  - usd-coin
  - dexie-bucks
  polling_interval_ms: 30000
fees:
  enabled: true
  daily_budget_mojos: 10000000000
  fee_to_gain_max_ratio: 0.3
  min_fee_mojos: 5000             # Was 50K (20x mempool); 5K still 2x estimate
  max_fee_mojos: 100000000
  adaptive_enabled: true
  fee_window_blocks: 1662
  fee_estimate_target_seconds: 300
inventory_aging:
  enabled: true
  aging_start_blocks: 500
  max_loss_relax_bps: 25
  relax_rate_bps_per_block: 0.05
# database.path is in secrets.yaml (machine-specific)
market_allocator:
  enabled: true
  eval_interval_blocks: 50
  min_alloc_pct: 0.10
  max_alloc_pct: 0.50
  hysteresis_bps: 50
  smooth_alpha: 0.20
  weight_spread: 1.0
  weight_volume: 1.0
  weight_competition: 1.0
  weight_fill_rate: 1.0
  weight_tri_arb: 1.0
  tri_arb_fee_bps: 15
  tri_arb_min_edge_bps: 5
recovery:
  enabled: true
  xch_low_threshold: 0.15       # Enter recovery below this XCH (lowered for small portfolio)
  xch_recovery_target: 1.0      # Exit recovery above this XCH
  max_take_per_block_xch: 0.5   # Max XCH to acquire per block
  max_premium_bps: 100           # Max premium over CEX price to pay
  cancel_on_enter: false         # Allow same-block recovery takes on entry
  zero_fee_below_xch: 0.001      # Fee-free recovery when XCH spendable is effectively dust
  pair_allowlist: ["XCH/wUSDC.b"]  # Limit recovery takes to pairs with a trusted anchor

# Buyer: dedicated offer-taker flow (see buyer.example.yaml for full options).
buyer:
  enabled: true
  config_path: "buyer.yaml"      # External file with full buyer settings

database:
  path: "data/xop_trader.db"
