# =============================================================================
# release.yml — XOPTrader automated release workflow
#
# Triggers on a version tag push (v*) or manual workflow_dispatch.
# Builds the C++ engine and Python GUI for three platforms and attaches
# all artifacts to a new GitHub Release.
#
# Artifacts included in the release
# -----------------------------------
# All files are placed under RELEASE/XOPTrader-{slug}/ (e.g. XOPTrader-020
# for v0.2.0) and bundled into XOPTrader-{slug}.zip. Each versioned binary
# also carries the release tag in its filename.
#
#   xop_trader-windows-x64-{tag}.exe            C++ engine — Windows 64-bit
#   xop_trader-linux-x64-{tag}                  C++ engine — Ubuntu 22.04 x86-64
#   xop_trader-macos-arm64-{tag}                C++ engine — macOS 14 Apple-Silicon
#   xop_trader-gui-windows-x64-{tag}.exe        Python GUI — Windows (PyInstaller)
#   xop_trader-installer-windows-x64-{tag}.exe  Windows installer with desktop-shortcut prompt
#   xop_trader-gui-linux-x64-{tag}              Python GUI — Ubuntu (PyInstaller)
#   xop_trader-linux-bundle-{tag}.tar.gz        Linux bundle: GUI binary + icon + .desktop + install.sh
#   xop_trader-gui-macos-arm64-{tag}            Python GUI — macOS (PyInstaller)
#   config.example.yaml                         Reference configuration file
#   XOPTrader-{slug}.zip                        Full release bundle (RELEASE/{folder}/ tree)
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1)"
        required: true
        default: "v0.1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent duplicate runs when a release also creates a tag push
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Job 1 — Build the C++ engine on each OS
# ---------------------------------------------------------------------------
jobs:
  build-cpp:
    name: C++ engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_DOWNLOADS: ${{ github.workspace }}/vcpkg-downloads
      VCPKG_BINARY_SOURCES: "x-gha,readwrite"
      VCPKG_HTTP_RETRY_COUNT: "10"
      VCPKG_HTTP_TIMEOUT: "300"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: xop_trader-windows-x64.exe
            cmake_build_type: Release
            binary_path: build/Release/xop_trader.exe
          - os: ubuntu-22.04
            artifact_name: xop_trader-linux-x64
            cmake_build_type: Release
            binary_path: build/xop_trader
          - os: macos-latest
            artifact_name: xop_trader-macos-arm64
            cmake_build_type: Release
            binary_path: build/xop_trader

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Read vcpkg baseline from manifest (single source of truth) -------
      - name: Read vcpkg baseline
        id: vcpkg-baseline
        shell: bash
        run: echo "sha=$(jq -r '.["builtin-baseline"]' cpp/vcpkg.json)" >> "$GITHUB_OUTPUT"

      # ---- Ensure vcpkg-downloads directory exists before bootstrap -----------
      - name: Create vcpkg downloads directory
        shell: bash
        run: mkdir -p "$VCPKG_DOWNLOADS"

      # ---- vcpkg setup with caching ----------------------------------------
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          vcpkgJsonGlob: "cpp/vcpkg.json"
          vcpkgGitCommitId: "${{ steps.vcpkg-baseline.outputs.sha }}"

      # ---- System dependencies (Ubuntu) ------------------------------------
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libssl-dev libcurl4-openssl-dev

      # ---- System dependencies (macOS) -------------------------------------
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      # ---- CMake configure & build -----------------------------------------
      - name: Configure CMake
        working-directory: cpp
        shell: bash
        run: >
          cmake -B ../build -S .
          ${{ runner.os != 'Windows' && '-G Ninja' || '' }}
          -DCMAKE_BUILD_TYPE=${{ matrix.cmake_build_type }}
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=${{ runner.os == 'Windows' && 'x64-windows' || runner.os == 'Linux' && 'x64-linux' || 'arm64-osx' }}

      - name: Build
        run: cmake --build build --config ${{ matrix.cmake_build_type }} --parallel

      - name: Stage Windows runtime bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --install build --config Release --prefix install
          New-Item -ItemType Directory -Force -Path windows-runtime | Out-Null
          Copy-Item install\bin\* windows-runtime\
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "windows-runtime\VC_redist.x64.exe"

      - name: Run tests
        run: ctest --test-dir build --build-config ${{ matrix.cmake_build_type }} --output-on-failure

      # ---- Rename binary to platform-specific name -------------------------
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp ${{ matrix.binary_path }} ${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "${{ matrix.binary_path }}" "${{ matrix.artifact_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: xop_trader-windows-runtime-x64
          path: windows-runtime/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 2 — Build the Python GUI with PyInstaller on each OS
  # ---------------------------------------------------------------------------
  build-gui:
    name: Python GUI (${{ matrix.os }})
    needs: [build-cpp]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: xop_trader-gui-windows-x64.exe
            dist_path: gui/dist/xop_trader_gui.exe
            icon_fmt: ico
            icon_flag: --icon icon.ico
          - os: ubuntu-22.04
            artifact_name: xop_trader-gui-linux-x64
            dist_path: gui/dist/xop_trader_gui
            icon_fmt: png
            icon_flag: --icon icon.png
          - os: macos-latest
            artifact_name: xop_trader-gui-macos-arm64
            dist_path: gui/dist/xop_trader_gui
            icon_fmt: png
            icon_flag: --icon icon.png

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ---- Ubuntu system libs for PySide6 ----------------------------------
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1 libegl1 libxcb-cursor0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 \
            libdbus-1-3 libfontconfig1 libfreetype6

      - name: Install Python dependencies
        working-directory: gui
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Download Windows runtime bundle
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v4
        with:
          name: xop_trader-windows-runtime-x64
          path: gui/engine-runtime

      # ---- Generate application icon ---------------------------------------
      - name: Generate application icon
        working-directory: gui
        run: python resources/generate_icon.py . ${{ matrix.icon_fmt }}

      # ---- Build with PyInstaller ------------------------------------------
      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        working-directory: gui
        run: >
          pyinstaller
          --onefile
          --name xop_trader_gui
          --windowed
          --collect-submodules gui
          --hidden-import requests
          ${{ matrix.icon_flag }}
          main.py

      - name: Build with PyInstaller (Windows + bundled engine)
        if: runner.os == 'Windows'
        working-directory: gui
        shell: pwsh
        run: |
          $args = @(
            '--onefile',
            '--name', 'xop_trader_gui',
            '--windowed',
            '--collect-submodules', 'gui',
            '--hidden-import', 'requests',
            '--icon', 'icon.ico'
          )

          Get-ChildItem engine-runtime -File | ForEach-Object {
            $args += '--add-binary'
            $args += "$($_.FullName);engine-runtime"
          }

          $args += 'main.py'
          pyinstaller @args

      # ---- Rename dist to platform-specific name ---------------------------
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp ${{ matrix.dist_path }} ${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "${{ matrix.dist_path }}" "${{ matrix.artifact_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3 — Windows Installer (needs both C++ engine and GUI artifacts)
  # ---------------------------------------------------------------------------
  build-installer:
    name: Windows Installer
    needs: [build-cpp, build-gui]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate application icon
        run: |
          pip install pillow
          python gui/resources/generate_icon.py gui ico

      - name: Download C++ engine artifact
        uses: actions/download-artifact@v4
        with:
          name: xop_trader-windows-x64.exe
          path: dl/

      - name: Download C++ runtime bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: xop_trader-windows-runtime-x64
          path: dl/runtime/

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: xop_trader-gui-windows-x64.exe
          path: dl/

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          # Resolve AppVersion from tag (strip leading 'v'), fall back to "0.1"
          $version = if ($env:GITHUB_REF -match "refs/tags/v(.+)") { $Matches[1] } `
                     elseif ("${{ github.event.inputs.tag }}" -match "v(.+)") { $Matches[1] } `
                     else { "0.1" }

          # Stage files with the names installer.iss expects
          New-Item -ItemType Directory -Force -Path installer-staging
          Copy-Item dl\xop_trader-windows-x64.exe     installer-staging\xop_trader.exe
          Copy-Item dl\xop_trader-gui-windows-x64.exe installer-staging\xop_trader_gui.exe
          Copy-Item dl\runtime\*.dll                  installer-staging\
          Copy-Item dl\runtime\VC_redist.x64.exe      installer-staging\
          Copy-Item packaging\windows\installer.iss    installer-staging\
          Copy-Item gui\icon.ico                       installer-staging\
          Copy-Item config.example.yaml                installer-staging\

          # Compile the installer
          iscc /DAppVersion=$version `
               /O"installer-staging" `
               installer-staging\installer.iss

          Copy-Item installer-staging\xop_trader-installer-windows-x64.exe .

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: xop_trader-installer-windows-x64
          path: xop_trader-installer-windows-x64.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 4 — Linux Install Bundle (needs both C++ engine and GUI artifacts)
  # ---------------------------------------------------------------------------
  build-linux-bundle:
    name: Linux Install Bundle
    needs: [build-cpp, build-gui]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate application icon
        run: |
          pip install pillow
          python gui/resources/generate_icon.py gui png

      - name: Download C++ engine artifact
        uses: actions/download-artifact@v4
        with:
          name: xop_trader-linux-x64
          path: dl/

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: xop_trader-gui-linux-x64
          path: dl/

      - name: Build Linux install bundle
        run: |
          mkdir -p linux-bundle
          cp dl/xop_trader-linux-x64            linux-bundle/xop_trader
          cp dl/xop_trader-gui-linux-x64        linux-bundle/xop_trader_gui
          cp gui/icon.png                       linux-bundle/
          cp config.example.yaml                linux-bundle/
          cp packaging/linux/xop_trader.desktop  linux-bundle/
          cp packaging/linux/install.sh          linux-bundle/
          cp packaging/linux/uninstall.sh        linux-bundle/
          chmod +x linux-bundle/install.sh linux-bundle/uninstall.sh \
                   linux-bundle/xop_trader_gui linux-bundle/xop_trader
          tar -czf xop_trader-linux-bundle.tar.gz -C linux-bundle .

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: xop_trader-linux-bundle
          path: xop_trader-linux-bundle.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 5 — Create the GitHub Release and upload all artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-cpp, build-gui, build-installer, build-linux-bundle]
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # needed to create releases and upload assets

    steps:
      - uses: actions/checkout@v4

      # Download every artifact uploaded by the build jobs into a temp directory
      # to avoid name collisions (artifact folder names match the target file names)
      - uses: actions/download-artifact@v4
        with:
          path: release-assets-tmp/

      # Flatten the nested per-artifact directories into release-assets/
      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find release-assets-tmp -type f -exec mv -t release-assets/ {} +
          rm -rf release-assets-tmp

      # Resolve the tag: prefer the real git tag, fall back to workflow_dispatch input
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      # Compute a compact version slug: v0.2.0 → 020  (strip 'v', remove dots)
      - name: Compute version slug
        id: version
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          SLUG="${TAG#v}"
          SLUG="${SLUG//./}"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "folder=XOPTrader-${SLUG}" >> "$GITHUB_OUTPUT"

      # Organise all artifacts into RELEASE/{folder}/ with versioned filenames,
      # then create a zip archive of the entire RELEASE/ tree.
      - name: Organise versioned release folder
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          FOLDER="${{ steps.version.outputs.folder }}"
          SLUG="${{ steps.version.outputs.slug }}"
          DEST="RELEASE/${FOLDER}"
          mkdir -p "${DEST}"

          # Include the example config alongside the built artifacts
          cp config.example.yaml release-assets/config.example.yaml

          for f in release-assets/*; do
            name=$(basename "$f")
            case "$name" in
              *.tar.gz)
                base="${name%.tar.gz}"
                cp "$f" "${DEST}/${base}-${TAG}.tar.gz" ;;
              xop_trader*.exe)
                base="${name%.exe}"
                cp "$f" "${DEST}/${base}-${TAG}.exe" ;;
              *.exe)
                # Third-party runtime executables keep their original name
                cp "$f" "${DEST}/${name}" ;;
              *.yaml)
                # Keep config files with their original name (no version suffix)
                cp "$f" "${DEST}/${name}" ;;
              *.dll | *.pdb)
                # Windows runtime DLLs keep their original name
                cp "$f" "${DEST}/${name}" ;;
              *)
                # Linux/macOS binaries and other extension-less files
                cp "$f" "${DEST}/${name}-${TAG}" ;;
            esac
          done

          # Bundle the entire RELEASE/ folder tree into a single zip archive
          zip -r "XOPTrader-${SLUG}.zip" "RELEASE/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "XOPTrader ${{ steps.tag.outputs.value }}"
          body: |
            ## XOPTrader ${{ steps.tag.outputs.value }}

            Automated release of the XOPTrader CHIA DEX market-making engine.

            ### Included artifacts

            All files are also bundled together in **`XOPTrader-${{ steps.version.outputs.slug }}.zip`**
            under `RELEASE/XOPTrader-${{ steps.version.outputs.slug }}/`.

            | File | Description |
            |------|-------------|
            | `XOPTrader-${{ steps.version.outputs.slug }}.zip` | **Full release bundle** — all artifacts inside `RELEASE/XOPTrader-${{ steps.version.outputs.slug }}/` |
            | `xop_trader-installer-windows-x64-${{ steps.tag.outputs.value }}.exe` | **Windows installer** — prompts to create desktop shortcut |
            | `xop_trader-gui-windows-x64-${{ steps.tag.outputs.value }}.exe` | Windows GUI standalone binary (no installer) |
            | `xop_trader-windows-x64-${{ steps.tag.outputs.value }}.exe` | C++ engine — Windows 64-bit |
            | `xop_trader-linux-bundle-${{ steps.tag.outputs.value }}.tar.gz` | **Linux bundle** — GUI binary + icon + `.desktop` + `install.sh` |
            | `xop_trader-gui-linux-x64-${{ steps.tag.outputs.value }}` | Linux GUI standalone binary (no installer) |
            | `xop_trader-linux-x64-${{ steps.tag.outputs.value }}` | C++ engine — Ubuntu 22.04 x86-64 |
            | `xop_trader-gui-macos-arm64-${{ steps.tag.outputs.value }}` | Python GUI — macOS (standalone) |
            | `xop_trader-macos-arm64-${{ steps.tag.outputs.value }}` | C++ engine — macOS 14 Apple-Silicon |
            | `config.example.yaml` | Reference configuration file |
            | `Source code (.zip / .tar.gz)` | GitHub-generated source archives |

            ### Quick start

            **Windows** — run the installer and follow the wizard:
            ```
            xop_trader-installer-windows-x64-${{ steps.tag.outputs.value }}.exe
            ```
            The installer will offer to create a desktop shortcut (optional, unchecked by default).

            **Linux** — extract the bundle and run the install script:
            ```bash
            tar -xzf xop_trader-linux-bundle-${{ steps.tag.outputs.value }}.tar.gz
            ./install.sh          # prompts: "Create a desktop shortcut?" [Y/n]
            # or: ./install.sh --no-desktop  (skip the prompt)
            ```

            **macOS** — run the GUI binary directly; drag it to Applications if you wish:
            ```bash
            chmod +x xop_trader-gui-macos-arm64-${{ steps.tag.outputs.value }}
            ./xop_trader-gui-macos-arm64-${{ steps.tag.outputs.value }}
            ```

            **All platforms** — copy the example config and edit before first run:
            ```bash
            cp config.example.yaml config.yaml
            # edit config.yaml with your credentials
            ./xop_trader-{platform}-${{ steps.tag.outputs.value }} --config config.yaml
            ```

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          draft: false
          prerelease: false
          files: |
            RELEASE/${{ steps.version.outputs.folder }}/*
            XOPTrader-${{ steps.version.outputs.slug }}.zip
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Job 6 — Create a GitHub issue when the release workflow fails
  # ---------------------------------------------------------------------------
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-22.04
    needs: [build-cpp, build-gui, build-installer, build-linux-bundle, release]
    if: failure()
    permissions:
      issues: write     # needed to create failure notification issues

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 Release workflow failed (run #${context.runNumber})`;
            const body = [
              `The **Release** workflow failed.`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Run | [#${context.runNumber}](${run_url}) |`,
              `| Ref | \`${context.ref}\` |`,
              `| Triggered by | @${context.actor} |`,
              `| Event | \`${context.eventName}\` |`,
              ``,
              `Please investigate the [failed run](${run_url}) and fix any issues before re-running the release.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug'],
            });
