# =============================================================================
# compile-check.yml — XOPTrader compile-error check
#
# Runs on every push and pull request to catch C++ and Python compile errors
# before they land on the main branch.
#
# C++ check  — full CMake + vcpkg build on Ubuntu (GCC, C++20)
# Python check — compileall-based syntax scan of all .py files
# =============================================================================

name: Compile Check

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — C++ compile check (Ubuntu, GCC, vcpkg managed dependencies)
  # ---------------------------------------------------------------------------
  cpp-compile:
    name: C++ compile check (Ubuntu)
    runs-on: ubuntu-22.04
    env:
      VCPKG_DOWNLOADS: ${{ github.workspace }}/vcpkg-downloads
      X_VCPKG_ASSET_SOURCES: "x-gha,readwrite"
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      VCPKG_HTTP_RETRY_COUNT: "10"
      VCPKG_HTTP_TIMEOUT: "300"
      VCPKG_GITHUB_BASE_URL: https://github.com

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Read vcpkg baseline from manifest (single source of truth) -------
      - name: Read vcpkg baseline
        id: vcpkg-baseline
        run: echo "sha=$(jq -r '.["builtin-baseline"]' cpp/vcpkg.json)" >> "$GITHUB_OUTPUT"

      # ---- vcpkg setup with caching ----------------------------------------
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          vcpkgJsonGlob: "cpp/vcpkg.json"
          vcpkgCommitId: "${{ steps.vcpkg-baseline.outputs.sha }}"

      # ---- System dependencies ---------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libssl-dev libcurl4-openssl-dev

      # ---- CMake configure -------------------------------------------------
      - name: Configure CMake
        working-directory: cpp
        run: >
          cmake -B ../build -S .
          -DCMAKE_BUILD_TYPE=Debug
          -DXOP_BUILD_TESTS=ON
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-linux

      # ---- Build (compile-error check) -------------------------------------
      - name: Build
        run: cmake --build build --config Debug --parallel

  # ---------------------------------------------------------------------------
  # Job 2 — Python syntax check
  # ---------------------------------------------------------------------------
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m compileall -q -x '(^|/)\.git(/|$)' .
          echo "All Python files compiled without errors."
