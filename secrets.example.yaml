# XOPTrader Secrets Template
#
# Copy to secrets.yaml and fill in your values.
# secrets.yaml is gitignored -- NEVER commit it.
#
# These fields are deep-merged on top of config.yaml at startup.
# Only sensitive or machine-specific values belong here.
# Environment-variable substitution is supported:
#   ${VAR}           -- replaced with the env var's value; error if unset.
#   ${VAR:-default}  -- replaced with the env var's value, or "default" if unset.

chia:
  # Your Chia wallet fingerprint (run `chia keys show` to find it)
  wallet_fingerprint: 0

  # Paths to Chia SSL certificates (tilde ~ is expanded to HOME)
  ssl_cert_path: ~/.chia/mainnet/config/ssl/full_node/private_full_node.crt
  ssl_key_path: ~/.chia/mainnet/config/ssl/full_node/private_full_node.key
  wallet_cert_path: ~/.chia/mainnet/config/ssl/wallet/private_wallet.crt
  wallet_key_path: ~/.chia/mainnet/config/ssl/wallet/private_wallet.key
  ca_cert_path: ~/.chia/mainnet/config/ssl/ca/chia_ca.crt

monitoring:
  # Telegram alerting (leave empty to disable)
  telegram_bot_token: ''
  telegram_chat_id: ''

coingecko:
  # CoinGecko API key (leave empty for free tier / no auth)
  api_key: ''

database:
  # Path to SQLite database file (relative to engine working directory)
  path: data/xop_trader.db
