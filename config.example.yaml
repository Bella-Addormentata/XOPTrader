# XOPTrader Configuration
# Copy to config.yaml and fill in your values.
#
# Environment variable substitution:
#   Any string value may contain ${VAR} or ${VAR:-default} references.
#   ${VAR}           — replaced with the env var's value; error if unset.
#   ${VAR:-default}  — replaced with the env var's value, or "default" if unset.
#   This keeps secrets (tokens, fingerprints, API keys) out of plaintext YAML.
#   Example:  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
#
# --- Required vs Optional Sections -------------------------------------------
#
# REQUIRED sections (engine will not start without them):
#   chia, dexie, pairs, strategy, risk, volatility, monitoring, database
#
# OPTIONAL sections (omit entirely to use defaults):
#   depeg, arbitrage, coingecko, fees, inventory_aging, market_data,
#   adverse_selection
#
# Within required sections, individual fields are marked [REQUIRED] or
# [OPTIONAL] (with their default value) in comments below.
# ---------------------------------------------------------------------------

# --- chia: REQUIRED ----------------------------------------------------------
# All fields in this section are REQUIRED.
chia:
  # Node operating mode: auto | full_node | wallet_only
  #   auto        - try full node first, fall back to wallet-only (default)
  #   full_node   - require a running Chia full node
  #   wallet_only - run with Chia wallet service only (no full node needed)
  #                 Uses wallet's synced height; fee estimation uses static fees.
  #                 Saves ~60-100 GB disk (no blockchain DB) and syncs in minutes.
  mode: auto

  # Chia RPC endpoints (local full node + wallet)
  # In wallet_only mode, full_node_host/port and ssl_cert/key are not required.
  full_node_host: "localhost"
  full_node_port: 8555
  wallet_host: "localhost"
  wallet_port: 9256
  # Path to SSL certs (~/.chia/mainnet/config/ssl/)
  ssl_cert_path: "~/.chia/mainnet/config/ssl/full_node/private_full_node.crt"
  ssl_key_path: "~/.chia/mainnet/config/ssl/full_node/private_full_node.key"
  wallet_cert_path: "~/.chia/mainnet/config/ssl/wallet/private_wallet.crt"
  wallet_key_path: "~/.chia/mainnet/config/ssl/wallet/private_wallet.key"
  # CA certificate for verifying the Chia daemon (required for mTLS)
  ca_cert_path: "~/.chia/mainnet/config/ssl/ca/chia_ca.crt"
  # SSL verification for Chia RPC certificates.
  # Keep true in normal operation; set false only for trusted localhost
  # troubleshooting when certificate chain validation fails.
  verify_ssl: true
  # Wallet fingerprint (integer — get yours from `chia keys show`)
  # Supports env vars: wallet_fingerprint: ${XOP_WALLET_FINGERPRINT}
  wallet_fingerprint: 1234567890

# --- dexie: REQUIRED ---------------------------------------------------------
# All fields are REQUIRED.
dexie:
  # Dexie API — rate limit 50 req / 10s
  api_base: "https://api.dexie.space/v1"         # [REQUIRED]
  max_requests_per_10s: 50                        # [REQUIRED]
  claim_rewards: true                             # Auto-claim DBX liquidity rewards (default: true)

# --- pairs: REQUIRED (at least one enabled pair) ----------------------------
# Per-pair: base_asset_id, quote_asset_id, name are REQUIRED.
# All other fields (enabled, *_override, is_stablecoin, depeg_*) are OPTIONAL.
pairs:
  - base_asset_id: "xch"          # XCH native
    quote_asset_id: "fa4a180ac326e67ea289b869e3448256f6af05721f7cf934cb9901baa6b7a99d"  # wUSDC.b
    name: "XCH/wUSDC.b"
    enabled: true
  - base_asset_id: "xch"
    quote_asset_id: "ae1536f56760e471ad85ead45f00d680ff9cca73b8cc3407be778f1c0c606eac"  # BYC
    name: "XCH/BYC"
    enabled: true
  - base_asset_id: "ae1536f56760e471ad85ead45f00d680ff9cca73b8cc3407be778f1c0c606eac"  # BYC
    quote_asset_id: "fa4a180ac326e67ea289b869e3448256f6af05721f7cf934cb9901baa6b7a99d"  # wUSDC.b
    name: "BYC/wUSDC.b"
    enabled: true
    # Per-pair strategy overrides for stablecoin-vs-stablecoin pair
    gamma_override: 0.003          # Lower risk aversion — tight spreads are safe
    phi_override: 0.15             # Hold ~50/50 balance, don't shed inventory
    min_profit_margin_bps_override: 12  # Tighter margin — DBX subsidy offsets
    tier_spacing_bps_override: [15, 30, 50, 80]  # Much tighter ladder
    tier_size_pct_override: [0.30, 0.25, 0.25, 0.20]
    # Stablecoin peg monitoring — both sides are USD-pegged
    is_stablecoin: true
    peg_target: 1.0                # Both BYC and wUSDC.b should be $1
    depeg_warn_pct: 2.0            # Warn at 2% deviation
    depeg_bail_pct: 10.0           # Pull all quotes at 10% deviation
    depeg_sustained_blocks: 30     # Must persist ~26 min before bail
  - base_asset_id: "f322a205c034fe28681829fa5a2e483ac421f0952eb1292945c8db06e0a471a6"  # wmilliETH.b
    quote_asset_id: "xch"
    name: "wmilliETH.b/XCH"
    enabled: true
  - base_asset_id: "4cb15a8ecc85068fb1f98c09a5e489d1ad61b2af79690ce00f9fc4803c8b597f"  # wmilliETH
    quote_asset_id: "xch"
    name: "wmilliETH/XCH"
    enabled: true
  # XCH/DBX — Dexie liquidity rewards pair (135% APR bid-side, 75% APR ask-side).
  # Thin order book; enable only if you want to farm DBX incentive rewards.
  - base_asset_id: "xch"
    quote_asset_id: "db1a9020d48d9d4ad22631b66ab4b9ebd3637ef7758ad38881348c5d24c38f20"  # DBX
    name: "XCH/DBX"
    enabled: false

# --- strategy: REQUIRED ------------------------------------------------------
# Fields marked [REQUIRED] must be present; others use defaults if omitted.
strategy:
  # Avellaneda-Stoikov / GLFT parameters
  gamma: 0.01            # [REQUIRED] Risk aversion coefficient
  kappa: 1.5             # [REQUIRED] Fill intensity decay
  phi: 0.5               # [REQUIRED] Inventory skew strength (GLFT)
  q_max: 1000            # [REQUIRED] Max inventory in base units
  min_profit_margin_bps: 35  # [REQUIRED] Never post ask below cost_basis + this margin
  offer_ttl_blocks: 60       # [REQUIRED] Cancel stale offers after N blocks (~52 min)
  num_tiers: 4               # [REQUIRED] Multi-tier offer ladder depth
  tier_spacing_bps: [60, 120, 180, 240]  # [REQUIRED] Spread per tier (bps) — must be ≤ max_half_spread_bps
  tier_size_pct: [0.30, 0.25, 0.25, 0.20] # [REQUIRED] Capital fraction per tier (sum ≈ 1.0)
  max_half_spread_bps: 250  # [OPTIONAL, default: 250] Global cap on half-spread
  offer_fee_mojos: 10000000  # [OPTIONAL, default: 10000000] On-chain fee per offer/cancel
  # Startup market analysis: observe this many blocks before trading begins.
  # 0 = skip analysis and start trading immediately (default).
  # Example: 20 blocks (~17 min at 52 s/block).
  startup_analysis_blocks: 0
  # [T4-02] Reorg protection: require N confirmations before accepting a fill.
  # Default 6 blocks (~5 min).  0 = accept fills immediately (no protection).
  confirmation_depth_blocks: 6          # [OPTIONAL, default: 6]
  # [T4-11] Offer state reconciliation: full wallet-vs-state check every N blocks.
  # Default 20 blocks (~17 min).  0 = disabled.
  reconciliation_interval_blocks: 20     # [OPTIONAL, default: 20]

  # -- Minimum balance management --
  # Prevents zero-balance lockout by reserving a minimum in each asset.
  fee_reserve_xch: 1.0                # [OPTIONAL, default: 1.0]  XCH held back for on-chain fees
  min_reserve_units: 1.0               # [OPTIONAL, default: 1.0]  Absolute floor per coin (units)
  min_trading_units: 10.0              # [OPTIONAL, default: 10.0] Desired minimum for active trading
  auto_rebalance_enabled: true         # [OPTIONAL, default: true] Post buy-side-only to acquire depleted assets

  # -- Gap-aware dynamic tier spacing --
  # Analyses the competing order book for price gaps and shifts tier
  # spacing toward underserved ranges.  Captures spread competitors miss.
  gap_aware_spacing: true              # [OPTIONAL, default: true]  Enable/disable
  min_gap_bps: 50.0                    # [OPTIONAL, default: 50]    Min gap width to target
  max_gap_scan_bps: 1500.0             # [OPTIONAL, default: 1500]  Max scan distance from mid
  gap_blend_factor: 0.6                # [OPTIONAL, default: 0.6]   0=baseline, 1=full gap shift

  # -- Adverse-selection-aware tier sizing --
  # On slow blockchains (Chia ~52 s/block), tier 0 (tightest) is most
  # vulnerable to informed traders.  This reduces inner-tier size and
  # redistributes capital to safer outer tiers.
  adverse_selection_sizing: true       # [OPTIONAL, default: true]  Enable/disable
  adverse_selection_decay: 0.7         # [OPTIONAL, default: 0.7]   Lower = more outer-heavy
  adverse_selection_sigma_threshold: 0.05  # [OPTIONAL, default: 0.05] Halve decay above this vol

  # -- AMM blend weight --
  # Weight of TibetSwap AMM implied price in mid-price blend.
  # Anchors quotes to the AMM to prevent cross-venue arbitrage.
  amm_blend_weight: 0.15               # [OPTIONAL, default: 0.15]  0 = disable AMM blending

# --- risk: REQUIRED ----------------------------------------------------------
# First 5 fields are REQUIRED; circuit breaker fields are OPTIONAL.
risk:
  # Inventory limits
  soft_limit_pct: 0.60   # [REQUIRED] Begin aggressive skewing
  hard_limit_pct: 0.80   # [REQUIRED] Pull quotes on overweight side (must > soft_limit_pct)
  single_cat_cap_pct: 0.12  # [REQUIRED] Max portfolio % in one CAT
  # Position sizing
  kelly_fraction: 0.5    # [REQUIRED] Half-Kelly
  max_capital_per_pair_pct: 0.20  # [REQUIRED]
  # Circuit breakers (all OPTIONAL -- defaults shown)
  max_drawdown_pct: 0.10        # [OPTIONAL, default: 0.10]
  loss_window_blocks: 1152      # [OPTIONAL, default: 1152]
  max_window_loss_bps: 500      # [OPTIONAL, default: 500] 0 = disabled

# --- volatility: REQUIRED ----------------------------------------------------
volatility:
  # Yang-Zhang hybrid estimator
  lookback_blocks: 200   # [REQUIRED] ~2.9 hours
  yz_alpha: 0.34         # [REQUIRED] Yang-Zhang optimal weight
  # [T5-CR6] Multi-block candle aggregation: aggregate N blocks into one OHLC
  # candle to recover H/L variation when >90% of blocks are degenerate.
  # Default 10 (~8.7 min).  1 = no aggregation (legacy).
  candle_aggregation_blocks: 10  # [OPTIONAL, default: 10]

# --- monitoring: REQUIRED ----------------------------------------------------
# prometheus_port is REQUIRED; telegram fields are OPTIONAL (pair or omit both).
monitoring:
  # Prometheus
  prometheus_port: 9090             # [REQUIRED]
  # Alerts (optional — use env vars to keep tokens out of config files)
  # telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  # telegram_chat_id: "${TELEGRAM_CHAT_ID}"
  telegram_bot_token: ""
  telegram_chat_id: ""

# --- database: REQUIRED ------------------------------------------------------
database:
  # SQLite for Phase 1, PostgreSQL later
  path: "data/xop_trader.db"       # [REQUIRED]

# --- depeg: OPTIONAL (omit section to disable depeg monitoring) --------------
# Stablecoin depeg detection — global settings.
# Per-pair thresholds are set in each pair's is_stablecoin / depeg_* fields.
# All fields are OPTIONAL with defaults.
depeg:
  enabled: true                    # Master switch for depeg monitoring
  default_warn_pct: 2.0            # Default warn threshold (% off peg)
  default_bail_pct: 10.0           # Default bail threshold (% off peg) — pull all quotes
  default_sustained_blocks: 30     # Deviation must persist N blocks before bail (~26 min)
  auto_disable_pair: true          # Automatically disable pair on bail-out
  alert_on_warn: true              # Send Telegram alert on peg warning
  alert_on_bail: true              # Send Telegram alert on bail-out

# --- arbitrage: OPTIONAL (omit section to use defaults) ----------------------
# Arbitrage detection — triangular, CEX-DEX, cross-DEX, cross-bridge.
# All thresholds are in basis points (bps).  1 bps = 0.01%.
# All fields are OPTIONAL with defaults.
arbitrage:
  enabled: true                         # Master switch for arb scanning

  # Triangular arb (XCH -> A -> B -> XCH)
  triangular_min_profit_bps: 30         # Min net profit after all fees/slippage
  triangular_slippage_bps: 10           # Per-leg slippage estimate
  triangular_per_leg_fee_bps: 5         # Blockchain settlement fee per hop

  # CEX-DEX arb (dexie vs OKX/MEXC/Gate)
  cex_dex_min_edge_bps: 50              # Min raw edge to flag opportunity
  cex_dex_max_edge_bps: 500             # Reject edges above this (stale data)
  cex_fee_bps: 10                       # CEX taker fee (OKX VIP0 = 10)

  # Cross-DEX arb (dexie order book vs TibetSwap AMM)
  cross_dex_min_edge_bps: 15            # Lower — both legs are on-chain atomic
  tibetswap_fee_bps: 70                 # TibetSwap v2: 0.7%

  # Cross-bridge arb (wUSDC vs wUSDC.b)
  cross_bridge_min_edge_bps: 20         # Min divergence for same-underlying arb
  bridge_cost_bps: 15                   # warp.green bridge round-trip cost

  # Crossed-book arb (intra-DEX, Dexie has no matching engine)
  crossed_book_enabled: true            # Take crossed-book offers for instant profit
  crossed_book_min_edge_bps: 10         # Min edge in bps (low: zero bridge risk)
  crossed_book_max_take_xch: 5.0        # Max XCH to risk per take per block

  # General
  max_position_size: 100                # Max base-asset units per arb trade
  default_confidence: 0.75              # Base confidence when depth unknown
  min_confidence_threshold: 0.40        # Discard opportunities below this

# --- coingecko: OPTIONAL (omit section to disable CEX price reference) -------
# CoinGecko external price reference — provides CEX-grade mid-prices
# for assets with CoinGecko listings.  All fields are OPTIONAL with defaults.
coingecko:
  enabled: true
  # base_url: "https://api.coingecko.com/api/v3"   # Default; override for pro tier
  coin_ids: [chia, ethereum, usd-coin]              # CoinGecko coin identifiers
  polling_interval_ms: 30000                        # Poll every 30 s (free tier safe)
  # request_timeout_ms: 15000
  # connect_timeout_ms: 10000
  # max_retries: 3
  # retry_base_delay_ms: 1000
  # rate_limit_max_requests: 10                     # 10 req per 60 s window
  # rate_limit_window_ms: 60000
  # curl_thread_pool_size: 2
  # api_key: "${COINGECKO_API_KEY:-}"    # Empty = free tier; set env var for Demo plan
  api_key: ""                                       # Empty = free tier; set for Demo plan

# --- fees: OPTIONAL (omit section to use static offer_fee_mojos) -------------
# Fee budget tracking and dynamic fee selection (T4-03).
# All fields are OPTIONAL with defaults.
fees:
  enabled: true                       # Master switch for fee tracking
  daily_budget_mojos: 10000000000     # Max fees per 24h rolling window (0.01 XCH)
  fee_to_gain_max_ratio: 0.30        # Skip tier if round-trip fee > 30% of expected gain
  cancel_cost_multiplier: 2.0        # Round-trip multiplier: fee×M is used in the gain check
                                      # (2.0 = post + cancel; >2.0 adds margin for adaptive fee spikes)
  min_fee_mojos: 5000000             # Fee floor (0.000005 XCH)
  max_fee_mojos: 100000000           # Fee ceiling (0.0001 XCH)
  adaptive_enabled: true             # Query full node get_fee_estimate for mempool-aware fees
  fee_window_blocks: 1662            # Rolling window for budget (~24h at 52s/block)

# Inventory aging (T4-09): gradually relax the no-loss floor for positions
# held underwater for an extended period.  Capital locked in permanently-
# underwater positions has an opportunity cost; accepting a small controlled
# loss to free it up can be net-positive.
# --- inventory_aging: OPTIONAL (omit section to disable aging) ---------------
# All fields are OPTIONAL with defaults.
inventory_aging:
  enabled: false                      # Master switch (disabled by default)
  aging_start_blocks: 1000            # Begin relaxation after 1000 blocks (~14.4 h)
  max_loss_relax_bps: 50              # Maximum loss allowed: 50 bps (0.50%)
  relax_rate_bps_per_block: 0.05      # 0.05 bps/block => full 50 bps after ~1000 extra blocks

# --- T4-16: Online Kappa Calibration ----------------------------------------
# The kappa calibrator tracks fill rates at different spread levels and fits
# the fill-intensity decay parameter λ(δ) = A·exp(−κ·δ) using log-linear
# regression.  Runs every calibration_interval_blocks blocks.
# Note: kappa_calibrator settings are currently hardcoded from strategy.kappa;
# these fields are documented for future YAML extraction.
# kappa_calibrator:
#   num_buckets: 10                   # Spread buckets for fill binning
#   bucket_width_bps: 10              # Width of each bucket (bps)
#   min_fills_for_calibration: 20     # Minimum fills before producing estimates
#   decay_factor: 0.95                # Exponential decay for aging observations
#   kappa_min: 0.1                    # Lower bound on fitted κ
#   kappa_max: 10.0                   # Upper bound on fitted κ
#   calibration_interval_blocks: 50   # Run calibration every N blocks (~43 min)

# --- market_data: OPTIONAL (omit section to use defaults) --------------------
# VPIN, OFI, whale detection, and competitor detection parameters.
# All fields are OPTIONAL with defaults shown below.
market_data:
  # Whale detection
  whale_trade_threshold: 50000000000000  # 50 XCH in mojos
  whale_volume_fraction: 0.05            # 5% of 24h volume triggers whale
  whale_window_blocks: 10                # ~520 s observation window
  whale_max_spread_multiplier: 3.0       # Max spread widening during whale activity

  # VPIN (Volume-Synchronized Probability of Informed Trading)
  vpin_bucket_size: 10.0                 # XCH per VPIN volume bucket
  vpin_window_buckets: 50                # Rolling bucket window

  # OFI (Order Flow Imbalance)
  ofi_window_size: 20                    # Snapshots retained for OFI

  # Competitor detection
  enable_competitor_tracking: true
  min_competitor_offer_size: 1000000000000  # 1 XCH in mojos
  competitor_alert_threshold_bps: 50.0   # Alert when competitor spread < this

  # Asymmetric spread during whale activity (0.0 = symmetric, 1.0 = fully asymmetric)
  asymmetric_skew_factor: 0.5

  # CEX data freshness: seconds before CEX weight decays to zero
  cex_freshness_threshold_sec: 120.0

# --- adverse_selection: OPTIONAL (omit section to use defaults) ---------------\n# Bayesian PIN estimator parameters.  All fields are OPTIONAL.\nadverse_selection:
  prior_alpha: 2.0                       # Adverse fill pseudo-count (E[PIN] = α/(α+β))
  prior_beta: 8.0                        # Non-adverse fill pseudo-count
  observation_blocks: 10                 # Post-fill observation window (~8.7 min)
  adverse_threshold: 0.003               # 30 bps adverse classification
  max_history: 500                       # Rolling fill window
  decay_factor: 0.0                      # Exponential decay in posterior (0 = none)
