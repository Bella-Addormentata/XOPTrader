# XOPTrader Configuration (public / version-controlled)
#
# This file contains all operational tuning parameters.  It is safe to
# commit to version control.
#
# Sensitive values (wallet fingerprint, SSL paths, API keys, Telegram
# tokens, database path) belong in secrets.yaml which is gitignored.
# At startup the engine deep-merges secrets.yaml on top of this file,
# so you only need to put secret overrides there.
#
# See secrets.example.yaml for a template.
#
# Environment variable substitution:
#   Any string value may contain ${VAR} or ${VAR:-default} references.
#   ${VAR}           — replaced with the env var's value; error if unset.
#   ${VAR:-default}  — replaced with the env var's value, or "default" if unset.
#
# --- Required vs Optional Sections -------------------------------------------
#
# REQUIRED sections (engine will not start without them):
#   chia, dexie, pairs, strategy, risk, volatility, monitoring
#
# REQUIRED in secrets.yaml:
#   chia.wallet_fingerprint, chia.ssl_*_path, database.path
#
# OPTIONAL sections (omit entirely to use defaults):
#   depeg, arbitrage, coingecko, fees, inventory_aging, market_data,
#   adverse_selection, market_allocator, recovery
#
# Within required sections, individual fields are marked [REQUIRED] or
# [OPTIONAL] (with their default value) in comments below.
# ---------------------------------------------------------------------------

# --- chia: REQUIRED ----------------------------------------------------------
# Connection settings only.  Wallet fingerprint and SSL paths are in secrets.yaml.
chia:
  # Node operating mode: auto | full_node | wallet_only
  #   auto        - try full node first, fall back to wallet-only (default)
  #   full_node   - require a running Chia full node
  #   wallet_only - run with Chia wallet service only (no full node needed)
  #                 Uses wallet's synced height; fee estimation uses static fees.
  #                 Saves ~60-100 GB disk (no blockchain DB) and syncs in minutes.
  mode: auto

  # Chia RPC endpoints (local full node + wallet)
  full_node_host: "localhost"
  full_node_port: 8555
  wallet_host: "localhost"
  wallet_port: 9256
  # SSL verification for Chia RPC certificates.
  verify_ssl: true

# --- dexie: REQUIRED ---------------------------------------------------------
# All fields are REQUIRED.
dexie:
  # Dexie API — rate limit 50 req / 10s
  api_base: "https://api.dexie.space/v1"         # [REQUIRED]
  max_requests_per_10s: 50                        # [REQUIRED]
  claim_rewards: true                             # Auto-claim DBX liquidity rewards (default: true)

# --- pairs: REQUIRED (at least one enabled pair) ----------------------------
# Per-pair: base_asset_id, quote_asset_id, name are REQUIRED.
# All other fields (enabled, *_override, is_stablecoin, depeg_*) are OPTIONAL.
pairs:
  - base_asset_id: "xch"          # XCH native
    quote_asset_id: "fa4a180ac326e67ea289b869e3448256f6af05721f7cf934cb9901baa6b7a99d"  # wUSDC.b
    name: "XCH/wUSDC.b"
    enabled: true
  - base_asset_id: "xch"
    quote_asset_id: "ae1536f56760e471ad85ead45f00d680ff9cca73b8cc3407be778f1c0c606eac"  # BYC
    name: "XCH/BYC"
    enabled: true
  - base_asset_id: "ae1536f56760e471ad85ead45f00d680ff9cca73b8cc3407be778f1c0c606eac"  # BYC
    quote_asset_id: "fa4a180ac326e67ea289b869e3448256f6af05721f7cf934cb9901baa6b7a99d"  # wUSDC.b
    name: "BYC/wUSDC.b"
    enabled: true
    # Per-pair strategy overrides for stablecoin-vs-stablecoin pair
    gamma_override: 0.001          # Lower risk aversion — tight spreads are safe
    min_profit_margin_bps_override: 5    # Very tight — DBX subsidy offsets
    max_half_spread_bps_override: 75     # Cap spread for stablecoin pair
    tier_spacing_bps_override: [3, 5, 8, 15, 25, 40]  # Much tighter ladder
    tier_size_pct_override: [0.30, 0.25, 0.20, 0.12, 0.08, 0.05]
    min_offer_size_units_override: 1    # Drop tiers below 1 unit — prevents dust offers
    # Stablecoin peg monitoring — both sides are USD-pegged
    is_stablecoin: true
    peg_target: 1.0                # Both BYC and wUSDC.b should be $1
    depeg_warn_pct: 2.0            # Warn at 2% deviation
    depeg_bail_pct: 10.0           # Pull all quotes at 10% deviation
    depeg_sustained_blocks: 30     # Must persist ~26 min before bail
    # Stablecoin peg-anchoring: blend mid-price toward the peg target
    peg_anchor_threshold_pct: 2.0  # [OPTIONAL] Only anchor when within 2% of peg
    peg_anchor_weight: 0.60        # [OPTIONAL] Blend weight toward peg (0=ignore, 1=force to peg)
    # Stablecoin quoting modes
    stablecoin_exempt_buyonly: true       # [OPTIONAL] Don't suppress buy-only during imbalance
    stablecoin_undercut_all_tiers: true   # [OPTIONAL] Undercut competitors on all tiers
    stablecoin_flat_sizing: true          # [OPTIONAL] Equal-weight tiers instead of tapered
    stablecoin_skip_gap_aware: true       # [OPTIONAL] Skip gap-aware spacing (tight spread matters more)
  - base_asset_id: "f322a205c034fe28681829fa5a2e483ac421f0952eb1292945c8db06e0a471a6"  # wmilliETH.b
    quote_asset_id: "xch"
    name: "wmilliETH.b/XCH"
    enabled: true
  - base_asset_id: "4cb15a8ecc85068fb1f98c09a5e489d1ad61b2af79690ce00f9fc4803c8b597f"  # wmilliETH
    quote_asset_id: "xch"
    name: "wmilliETH/XCH"
    enabled: true
  # XCH/DBX — Dexie liquidity rewards pair (135% APR bid-side, 75% APR ask-side).
  # Thin order book; enable only if you want to farm DBX incentive rewards.
  - base_asset_id: "xch"
    quote_asset_id: "db1a9020d48d9d4ad22631b66ab4b9ebd3637ef7758ad38881348c5d24c38f20"  # DBX
    name: "XCH/DBX"
    enabled: false

# --- strategy: REQUIRED ------------------------------------------------------
# Fields marked [REQUIRED] must be present; others use defaults if omitted.
strategy:
  # Avellaneda-Stoikov / GLFT parameters
  gamma: 0.01            # [REQUIRED] Risk aversion coefficient
  kappa: 1.5             # [REQUIRED] Fill intensity decay
  phi: 0.5               # [REQUIRED] Inventory skew strength (GLFT). Higher = more aggressive rebalancing. Recommended: 0.8 for skewed portfolios
  q_max: 30              # [REQUIRED] Max inventory in base units. Wallet cap (v0.7.38) prevents ask overcommit.
  min_profit_margin_bps: 35  # [REQUIRED] Never post ask below cost_basis + this margin
  high_vol_multiplier: 1.3   # [OPTIONAL, default: 1.3] Spread widening multiplier during high-vol regimes
  sigma_floor: 0.001         # [OPTIONAL, default: 0.001] Minimum annualized sigma for GLFT formula (prevents degenerate spreads when market is flat)
  offer_ttl_blocks: 600      # [REQUIRED] Soft TTL: cancel stale offers after N blocks (~5 hours at 600)
  num_tiers: 4               # [REQUIRED] Multi-tier offer ladder depth (4 recommended: fewer, larger tiers)
  tier_spacing_bps: [35, 100, 200, 300]  # [REQUIRED] Spread per tier (bps)
  tier_size_pct: [0.15, 0.20, 0.30, 0.35] # [REQUIRED] Capital fraction per tier (sum ≈ 1.0)
  max_half_spread_bps: 250  # [OPTIONAL, default: 250] Global cap on half-spread
  offer_fee_mojos: 10000000  # [OPTIONAL, default: 10000000] On-chain fee per offer/cancel
  # Startup market analysis: observe this many blocks before trading begins.
  # 0 = skip analysis and start trading immediately (default).
  # Example: 20 blocks (~17 min at 52 s/block).
  startup_analysis_blocks: 0
  # [T4-02] Reorg protection: require N confirmations before accepting a fill.
  # Default 6 blocks (~5 min).  0 = accept fills immediately (no protection).
  confirmation_depth_blocks: 6          # [OPTIONAL, default: 6]
  # [T4-11] Offer state reconciliation: full wallet-vs-state check every N blocks.
  # Default 20 blocks (~17 min).  0 = disabled.
  reconciliation_interval_blocks: 20     # [OPTIONAL, default: 20]

  # -- Minimum balance management --
  # Prevents zero-balance lockout by reserving a minimum in each asset.
  fee_reserve_xch: 1.0                # [OPTIONAL, default: 1.0]  XCH held back for on-chain fees
  fee_min_spendable_xch: 0.01          # [OPTIONAL, default: 0.01] Minimum XCH that must remain spendable
  taker_min_spendable_xch: 0.25        # [OPTIONAL, default: 0.25] Preflight floor for take_offer-based strategies
  block_time_seconds: 52.0             # [OPTIONAL, default: 52.0] CHIA block-time assumption for freshness checks
  min_spendable_reserve_pct: 0.10      # [OPTIONAL, default: 0.25] Suppress side when spendable/confirmed < this
                                       #   Lower if most inventory is locked in offers (e.g. depleted CATs).
  arb_reserve_coins: 2                 # [OPTIONAL, default: 2]   Coins kept unallocated for arb takes
  min_reserve_units: 1.0               # [OPTIONAL, default: 1.0]  Absolute floor per coin (units)
  min_offer_size_units: 1.0            # [OPTIONAL, default: 1.0]  Min offer size in base-asset units; tiers below this are dropped
  min_trading_units: 10.0              # [OPTIONAL, default: 10.0] Desired minimum for active trading
  auto_rebalance_enabled: true         # [OPTIONAL, default: true] Post buy-side-only to acquire depleted assets
  xch_ask_throttle_enabled: true       # [OPTIONAL, default: true] Enable smooth XCH ask throttling
  xch_ask_throttle_caution_xch: 2.0    # [OPTIONAL, default: 2.0] Start mild ask throttling below this
  xch_ask_throttle_low_xch: 1.0        # [OPTIONAL, default: 1.0] Stronger ask throttling below this
  xch_ask_throttle_critical_xch: 0.35  # [OPTIONAL, default: 0.35] Keep only defensive outer ask below this
  xch_ask_throttle_aggressiveness: 1.0 # [OPTIONAL, default: 1.0] <1 gentler, >1 more protective

  # -- Wall-aware retail niche pricing --
  # On Chia DEX, offers are atomic (all-or-nothing).  Small traders cannot
  # take large "wall" offers (e.g. 100 XCH) and must use our smaller ones.
  # When walls are detected, the engine widens spreads to capture a retail
  # premium rather than futilely undercutting walls it can't match on size.
  wall_size_threshold_xch: 20.0        # [OPTIONAL, default: 20.0]  Offers >= this are "walls"
  wall_niche_premium_pct: 0.15         # [OPTIONAL, default: 0.15]  Spread widening factor (15%)

  # -- Smart orphan management --
  # Cost-aware evaluation of offers found in the wallet on startup that
  # aren't in the engine's database.  Instead of blindly cancelling (wasting
  # fees and creating a zero-offer gap), evaluates each orphan against the
  # current market mid-price and adopts well-priced ones.
  #
  # Academic basis:
  #   Guéant, Lehalle & Fernandez-Tapia (2013) "Dealing with the Inventory Risk"
  #   Gao & Wang (2020) "Optimal market making in the presence of latency"
  #   Aït-Sahalia & Saglam (2017) "High frequency market making"
  orphan_adopt_enabled: true           # [OPTIONAL, default: true]   Enable cost-aware evaluation
  orphan_adverse_threshold: 0.02       # [OPTIONAL, default: 0.02]   Max adverse deviation to adopt (2%)
  orphan_max_adopt_age_blocks: 120     # [OPTIONAL, default: 120]    Max orphan age (~104 min)
  orphan_inventory_bonus: 0.01         # [OPTIONAL, default: 0.01]   Extra tolerance for inventory helpers

  # -- Gap-aware dynamic tier spacing --
  # Analyses the competing order book for price gaps and shifts tier
  # spacing toward underserved ranges.  Captures spread competitors miss.
  gap_aware_spacing: true              # [OPTIONAL, default: true]  Enable/disable
  min_gap_bps: 50.0                    # [OPTIONAL, default: 50]    Min gap width to target
  max_gap_scan_bps: 1500.0             # [OPTIONAL, default: 1500]  Max scan distance from mid
  gap_blend_factor: 0.6                # [OPTIONAL, default: 0.6]   0=baseline, 1=full gap shift

  # -- Competitive anchor pricing --
  # Instead of spacing tiers from mid, anchor Tier 0 to the best competing
  # offer on each side and step outward.  Ensures top-of-book placement.
  # Mutually exclusive with gap-aware spacing (anchor takes priority).
  # Falls back to mid-based spacing when no competing offers exist.
  competitive_anchor_enabled: false     # [OPTIONAL, default: false] Enable anchor pricing
  competitive_anchor_max_distance_bps: 500.0  # [OPTIONAL, default: 500] Max anchor dist from mid
  competitive_anchor_stride_bps: 65.0   # [OPTIONAL, default: 65]  Inter-tier spacing from anchor

  # -- Adverse-selection-aware tier sizing --
  # On slow blockchains (Chia ~52 s/block), tier 0 (tightest) is most
  # vulnerable to informed traders.  This reduces inner-tier size and
  # redistributes capital to safer outer tiers.
  adverse_selection_sizing: true       # [OPTIONAL, default: true]  Enable/disable
  adverse_selection_decay: 0.7         # [OPTIONAL, default: 0.7]   Lower = more outer-heavy
  adverse_selection_sigma_threshold: 0.05  # [OPTIONAL, default: 0.05] Halve decay above this vol

  # -- Cross-pair correlated inventory skewing (Guéant 2019) --
  # When multiple pairs share a common asset (e.g. XCH appears in XCH/BYC and
  # XCH/wUSDC.b), the skew from one pair's inventory can bleed into the other.
  cross_pair_skew_enabled: true         # [OPTIONAL, default: true]
  cross_pair_skew_phi: 0.30             # [OPTIONAL, default: 0.30]  Cross-pair skew strength. Recommended: 0.50 for portfolios with shared assets across pairs

  # -- Coin pool: pre-split XCH into smaller UTXOs for concurrent offers --
  coin_pool_target_count: 12            # [OPTIONAL, default: 12]   Target number of XCH coins. Lower (e.g., 3) for small portfolios
  coin_pool_target_xch: 2.0             # [OPTIONAL, default: 2.0]  Target XCH per coin. Lower (e.g., 0.5) for small portfolios
  coin_pool_interval_blocks: 5          # [OPTIONAL, default: 5]    Check interval (~4 min)

  # -- CAT coin pool: pre-split BYC, wUSDC.b etc. for concurrent offers --
  cat_coin_pool_target_count: 0          # [OPTIONAL, default: 10]  Target coins per CAT (0=disabled)
  cat_coin_pool_target_units: 10.0       # [OPTIONAL, default: 50.0] Target display units per coin

  # -- AMM blend weight --
  # Weight of TibetSwap AMM implied price in mid-price blend.
  # Anchors quotes to the AMM to prevent cross-venue arbitrage.
  amm_blend_weight: 0.15               # [OPTIONAL, default: 0.15]  0 = disable AMM blending

# --- risk: REQUIRED ----------------------------------------------------------
# First 5 fields are REQUIRED; circuit breaker fields are OPTIONAL.
risk:
  # Inventory limits
  soft_limit_pct: 0.60   # [REQUIRED] Begin aggressive skewing
  hard_limit_pct: 0.80   # [REQUIRED] Pull quotes on overweight side (must > soft_limit_pct)
  single_cat_cap_pct: 0.12  # [REQUIRED] Max portfolio % in one CAT
  # Position sizing
  kelly_fraction: 0.5    # [REQUIRED] Half-Kelly
  max_capital_per_pair_pct: 0.20  # [REQUIRED] Max fraction of total portfolio value for any pair. Raise to 0.85 if one asset dominates and needs selling
  # Circuit breakers (all OPTIONAL -- defaults shown)
  max_drawdown_pct: 0.10        # [OPTIONAL, default: 0.10]
  loss_window_blocks: 1152      # [OPTIONAL, default: 1152]
  max_window_loss_bps: 500      # [OPTIONAL, default: 500] 0 = disabled

  # Circuit-breaker auto-rebalance (enables loss manager for stuck positions)
  circuit_breaker_enabled: true          # [OPTIONAL, default: true]
  circuit_breaker_hard_limit_ratio: 0.80 # [OPTIONAL, default: 0.80]
  circuit_breaker_age_multiplier: 2.0    # [OPTIONAL, default: 2.0]
  circuit_breaker_max_loss_bps: 100      # [OPTIONAL, default: 100]

  # Circuit-breaker auto-rebalance (enables loss manager for stuck positions)
  circuit_breaker_enabled: true          # [OPTIONAL, default: true]
  circuit_breaker_hard_limit_ratio: 0.80 # [OPTIONAL, default: 0.80]
  circuit_breaker_age_multiplier: 2.0    # [OPTIONAL, default: 2.0]
  circuit_breaker_max_loss_bps: 100      # [OPTIONAL, default: 100]

# --- volatility: REQUIRED ----------------------------------------------------
volatility:
  # Yang-Zhang hybrid estimator
  lookback_blocks: 200   # [REQUIRED] ~2.9 hours
  yz_alpha: 0.34         # [REQUIRED] Yang-Zhang optimal weight
  # [T5-CR6] Multi-block candle aggregation: aggregate N blocks into one OHLC
  # candle to recover H/L variation when >90% of blocks are degenerate.
  # Default 10 (~8.7 min).  1 = no aggregation (legacy).
  candle_aggregation_blocks: 10  # [OPTIONAL, default: 10]

# --- monitoring: REQUIRED ----------------------------------------------------
# prometheus_port is REQUIRED.  Telegram tokens belong in secrets.yaml.
monitoring:
  # Prometheus
  prometheus_port: 9090             # [REQUIRED]

# --- depeg: OPTIONAL (omit section to disable depeg monitoring) --------------
# Stablecoin depeg detection — global settings.
# Per-pair thresholds are set in each pair's is_stablecoin / depeg_* fields.
# All fields are OPTIONAL with defaults.
depeg:
  enabled: true                    # Master switch for depeg monitoring
  default_warn_pct: 2.0            # Default warn threshold (% off peg)
  default_bail_pct: 10.0           # Default bail threshold (% off peg) — pull all quotes
  default_sustained_blocks: 30     # Deviation must persist N blocks before bail (~26 min)
  auto_disable_pair: true          # Automatically disable pair on bail-out
  alert_on_warn: true              # Send Telegram alert on peg warning
  alert_on_bail: true              # Send Telegram alert on bail-out

# --- arbitrage: OPTIONAL (omit section to use defaults) ----------------------
# Arbitrage detection — triangular, CEX-DEX, cross-DEX, cross-bridge.
# All thresholds are in basis points (bps).  1 bps = 0.01%.
# All fields are OPTIONAL with defaults.
arbitrage:
  enabled: true                         # Master switch for arb scanning

  # Triangular arb (XCH -> A -> B -> XCH)
  triangular_min_profit_bps: 30         # Min net profit after all fees/slippage
  triangular_slippage_bps: 10           # Per-leg slippage estimate
  cex_dex_confidence_cap: 0.25          # [OPTIONAL, default: 0.25] Hard cap on CEX-DEX confidence.
                                        #   CoinGecko data is aggregated/delayed and vulnerable to
                                        #   manipulation.  Capped below min_confidence_threshold so
                                        #   CEX-DEX signals are logged but not acted upon by default.
  cex_reference_half_spread_bps: 10     # [OPTIONAL, default: 10] Synthetic half-spread around CoinGecko mid
  midpoint_recycling_enabled: false     # [EXPERIMENTAL] Near-mid ask taker for inventory recycling
  midpoint_recycling_pairs: ["XCH/wUSDC.b"]
  midpoint_recycling_band_bps: 20      # [OPTIONAL, default: 20] Slack above the derived minimum discount floor
  midpoint_recycling_min_take_xch: 0.10
  midpoint_recycling_max_take_xch: 0.25
  midpoint_recycling_cooldown_blocks: 4
  midpoint_recycling_max_takes_per_block: 1
  midpoint_recycling_daily_take_xch_cap: 2.0
  midpoint_recycling_epoch_blocks: 4608
  midpoint_recycling_min_expected_edge_bps: 5
  midpoint_recycling_fee_buffer_bps: 2
  midpoint_recycling_toxicity_buffer_bps: 6
  midpoint_recycling_slippage_buffer_bps: 2
  midpoint_recycling_inventory_ratio_cap: 0.60
  midpoint_recycling_require_cex_ref: true
  midpoint_recycling_max_cex_age_blocks: 10
  midpoint_recycling_vpin_max: 0.70
  triangular_per_leg_fee_bps: 5         # Blockchain settlement fee per hop

  # CEX-DEX arb (dexie vs OKX/MEXC/Gate)
  cex_dex_min_edge_bps: 50              # Min raw edge to flag opportunity
  cex_dex_max_edge_bps: 500             # Reject edges above this (stale data)
  cex_fee_bps: 10                       # CEX taker fee (OKX VIP0 = 10)
  cex_dex_confidence_cap: 0.25          # [OPTIONAL, default: 0.25] Hard cap on CEX-DEX confidence.
                                        #   CoinGecko data is aggregated/delayed and vulnerable to
                                        #   manipulation.  Capped below min_confidence_threshold so
                                        #   CEX-DEX signals are logged but not acted upon by default.

  # Cross-DEX arb (dexie order book vs TibetSwap AMM)
  cross_dex_min_edge_bps: 15            # Lower — both legs are on-chain atomic
  tibetswap_fee_bps: 70                 # TibetSwap v2: 0.7%

  # Cross-bridge arb (wUSDC vs wUSDC.b)
  cross_bridge_min_edge_bps: 20         # Min divergence for same-underlying arb
  bridge_cost_bps: 15                   # warp.green bridge round-trip cost

  # Crossed-book arb (intra-DEX, Dexie has no matching engine)
  crossed_book_enabled: true            # Take crossed-book offers for instant profit
  crossed_book_min_edge_bps: 10         # Min edge in bps (low: zero bridge risk)
  crossed_book_max_take_xch: 5.0        # Max XCH to risk per take per block
  cancel_worst_to_free: true            # [OPTIONAL, default: true] Cancel worst offer to free coin for arb

  # Cross-stablecoin arb (BYC ~= wUSDC.b ~= $1; compare XCH/BYC vs XCH/wUSDC.b)
  cross_stable_arb_enabled: true        # Take offers when cross-market edge found
  cross_stable_min_edge_bps: 15
  cross_stable_max_take_xch: 5.0
  peg_arb_enabled: true                 # Take offers that cross the $1 peg on stablecoin pairs
  peg_arb_min_edge_bps: 5               # Min bps above/below peg to trigger (5 = 0.05%)
  peg_arb_max_take_units: 50            # Max base-asset units per take (e.g. 50 BYC)
  peg_arb_max_inventory_ratio: 0.70     # Suppress takes beyond 70:30 balance (0.5 = 50:50)
  cross_stable_min_edge_bps: 15         # Min edge in bps after normalisation
  cross_stable_max_take_xch: 5.0        # Max XCH to risk per take per block

  # General
  max_position_size: 100                # Max base-asset units per arb trade
  default_confidence: 0.75              # Base confidence when depth unknown
  min_confidence_threshold: 0.40        # Discard opportunities below this

# --- coingecko: OPTIONAL (omit section to disable CEX price reference) -------
# CoinGecko external price reference — provides CEX-grade mid-prices
# for assets with CoinGecko listings.  All fields are OPTIONAL with defaults.
coingecko:
  enabled: true
  # base_url: "https://api.coingecko.com/api/v3"   # Default; override for pro tier
  coin_ids: [chia, ethereum, usd-coin]              # CoinGecko coin identifiers
  polling_interval_ms: 30000                        # Poll every 30 s (free tier safe)
  # request_timeout_ms: 15000
  # connect_timeout_ms: 10000
  # max_retries: 3
  # retry_base_delay_ms: 1000
  # rate_limit_max_requests: 10                     # 10 req per 60 s window
  # rate_limit_window_ms: 60000
  # curl_thread_pool_size: 2
  # api_key belongs in secrets.yaml
                 # Fee floor (5K mojos, ~2x typical mempool estimate
# --- fees: OPTIONAL (omit section to use static offer_fee_mojos) -------------
# Fee budget tracking and dynamic fee selection (T4-03).
# All fields are OPTIONAL with defaults.
fees:
  enabled: true                       # Master switch for fee tracking
  daily_budget_mojos: 10000000000     # Max fees per 24h rolling window (0.01 XCH)
  fee_to_gain_max_ratio: 0.30        # Skip tier if round-trip fee > 30% of expected gain
  cancel_cost_multiplier: 2.0        # Round-trip multiplier: fee×M is used in the gain check
                                      # (2.0 = post + cancel; >2.0 adds margin for adaptive fee spikes)
  min_fee_mojos: 5000                 # Fee floor (5K mojos, ~2x typical mempool estimate)
  max_fee_mojos: 100000000           # Fee ceiling (0.0001 XCH)
  adaptive_enabled: true             # Query full node get_fee_estimate for mempool-aware fees
  fee_window_blocks: 1662            # Rolling window for budget (~24h at 52s/block)
  fee_estimate_target_seconds: 300   # Target inclusion time for fee estimate (300=5min, low urgency)

# Inventory aging (T4-09): gradually relax the no-loss floor for positions
# held underwater for an extended period.  Capital locked in permanently-
# underwater positions has an opportunity cost; accepting a small controlled
# loss to free it up can be net-positive.
# --- inventory_aging: OPTIONAL (omit section to disable aging) ---------------
# All fields are OPTIONAL with defaults.
inventory_aging:
  enabled: false                      # Master switch (disabled by default)
  aging_start_blocks: 1000            # Begin relaxation after 1000 blocks (~14.4 h)
  max_loss_relax_bps: 50              # Maximum loss allowed: 50 bps (0.50%)
  relax_rate_bps_per_block: 0.05      # 0.05 bps/block => full 50 bps after ~1000 extra blocks

# --- T4-16: Online Kappa Calibration ----------------------------------------
# The kappa calibrator tracks fill rates at different spread levels and fits
# the fill-intensity decay parameter λ(δ) = A·exp(−κ·δ) using log-linear
# regression.  Runs every calibration_interval_blocks blocks.
# Note: kappa_calibrator settings are currently hardcoded from strategy.kappa;
# these fields are documented for future YAML extraction.
# kappa_calibrator:
#   num_buckets: 10                   # Spread buckets for fill binning
#   bucket_width_bps: 10              # Width of each bucket (bps)
#   min_fills_for_calibration: 20     # Minimum fills before producing estimates
#   decay_factor: 0.95                # Exponential decay for aging observations
#   kappa_min: 0.1                    # Lower bound on fitted κ
#   kappa_max: 10.0                   # Upper bound on fitted κ
#   calibration_interval_blocks: 50   # Run calibration every N blocks (~43 min)

# --- market_data: OPTIONAL (omit section to use defaults) --------------------
# VPIN, OFI, whale detection, and competitor detection parameters.
# All fields are OPTIONAL with defaults shown below.
market_data:
  # Whale detection
  whale_trade_threshold: 50000000000000  # 50 XCH in mojos
  whale_volume_fraction: 0.05            # 5% of 24h volume triggers whale
  whale_window_blocks: 10                # ~520 s observation window
  whale_max_spread_multiplier: 3.0       # Max spread widening during whale activity

  # VPIN (Volume-Synchronized Probability of Informed Trading)
  vpin_bucket_size: 10.0                 # XCH per VPIN volume bucket
  vpin_window_buckets: 50                # Rolling bucket window

  # OFI (Order Flow Imbalance)
  ofi_window_size: 20                    # Snapshots retained for OFI

  # Competitor detection
  enable_competitor_tracking: true
  min_competitor_offer_size: 1000000000000  # 1 XCH in mojos
  competitor_alert_threshold_bps: 50.0   # Alert when competitor spread < this

  # Asymmetric spread during whale activity (0.0 = symmetric, 1.0 = fully asymmetric)
  asymmetric_skew_factor: 0.5

  # CEX data freshness: seconds before CEX weight decays to zero
  cex_freshness_threshold_sec: 120.0

  # Order-book-derived mid-price: use depth-weighted VWAP micro-price from
  # competing offers instead of simple BBO midpoint.  Gives more authority
  # over price determination by analyzing actual liquidity depth.
  orderbook_mid_enabled: true            # true = use depth-weighted orderbook mid
  orderbook_mid_depth: 5                 # Number of levels per side for VWAP

# --- adverse_selection: OPTIONAL (omit section to use defaults) ---------------
# Bayesian PIN estimator parameters.  All fields are OPTIONAL.
adverse_selection:
  prior_alpha: 2.0                       # Adverse fill pseudo-count (E[PIN] = α/(α+β))
  prior_beta: 8.0                        # Non-adverse fill pseudo-count
  observation_blocks: 10                 # Post-fill observation window (~8.7 min)
  adverse_threshold: 0.003               # 30 bps adverse classification
  max_history: 500                       # Rolling fill window
  decay_factor: 0.0                      # Exponential decay in posterior (0 = none)

# --- market_allocator: OPTIONAL (omit section to use defaults) ----------------
# Dynamic capital allocation across pairs based on spread, volume, competition,
# fill rate, and triangular arb opportunity.  All fields are OPTIONAL.
market_allocator:
  enabled: true                          # Master switch
  eval_interval_blocks: 50               # Re-evaluate every 50 blocks (~43 min)
  min_alloc_pct: 0.10                    # Minimum allocation per pair (10%)
  max_alloc_pct: 0.50                    # Maximum allocation per pair (50%)
  hysteresis_bps: 50                     # Don't reallocate unless score changes by 50 bps
  smooth_alpha: 0.20                     # EMA smoothing for allocation changes
  weight_spread: 1.0                     # Scoring weight for spread attractiveness
  weight_volume: 1.0                     # Scoring weight for 24h volume
  weight_competition: 1.0                # Scoring weight for competitor density
  weight_fill_rate: 1.0                  # Scoring weight for historical fill rate
  weight_tri_arb: 1.0                    # Scoring weight for triangular arb opportunity
  tri_arb_fee_bps: 15                    # Fee estimate for tri-arb scoring
  tri_arb_min_edge_bps: 5               # Min edge for tri-arb to score positively

# --- recovery: OPTIONAL (omit section to use defaults) -----------------------
# XCH recovery mode: when XCH balance drops below threshold, the engine
# enters recovery mode — cancels all offers and aggressively acquires XCH
# by taking market offers at up to max_premium_bps above CEX price.
recovery:
  enabled: true                          # Master switch for recovery mode
  xch_low_threshold: 0.50               # [OPTIONAL, default: 0.50] Enter recovery below this XCH
  xch_recovery_target: 1.0              # [OPTIONAL, default: 1.0]  Exit recovery above this XCH
  max_take_per_block_xch: 0.5           # [OPTIONAL, default: 0.5]  Max XCH to acquire per block
  max_premium_bps: 100                   # [OPTIONAL, default: 100]  Max premium over CEX price to pay
  cancel_on_enter: true                  # [OPTIONAL, default: true] Cancel all offers when entering recovery
  zero_fee_below_xch: 0.001             # [OPTIONAL, default: 0.001] Fee-free recovery when XCH is effectively dust
  # pair_allowlist: ["XCH/wUSDC.b"]      # [OPTIONAL] Restrict recovery takes to supported XCH-base pairs

# --- buyer: OPTIONAL (omit section to use defaults) -------------------------
# Dedicated opportunistic offer-taker flow. Full per-pair settings can live in
# a separate buyer.yaml file referenced by config_path.
buyer:
  enabled: false                         # [OPTIONAL, default: false]
  config_path: "buyer.yaml"             # [OPTIONAL] external buyer config
