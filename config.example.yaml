# XOPTrader Configuration
# Copy to config.yaml and fill in your values.

chia:
  # Chia RPC endpoints (local full node + wallet)
  full_node_host: "localhost"
  full_node_port: 8555
  wallet_host: "localhost"
  wallet_port: 9256
  # Path to SSL certs (~/.chia/mainnet/config/ssl/)
  ssl_cert_path: "~/.chia/mainnet/config/ssl/full_node/private_full_node.crt"
  ssl_key_path: "~/.chia/mainnet/config/ssl/full_node/private_full_node.key"
  wallet_cert_path: "~/.chia/mainnet/config/ssl/wallet/private_wallet.crt"
  wallet_key_path: "~/.chia/mainnet/config/ssl/wallet/private_wallet.key"
  # Wallet fingerprint (integer — get yours from `chia keys show`)
  wallet_fingerprint: 1234567890

dexie:
  # Dexie API — rate limit 50 req / 10s
  api_base: "https://api.dexie.space/v1"
  max_requests_per_10s: 50

# Trading pairs to market-make
pairs:
  - base_asset_id: "xch"          # XCH native
    quote_asset_id: "fa4a180ac326e67ea289b869e3448256f6af05721f7cf934cb9901baa6b7a99d"  # wUSDC.b
    name: "XCH/wUSDC.b"
    enabled: true
  - base_asset_id: "xch"
    quote_asset_id: "ae1536f56760e471ad85ead45f00d680ff9cca73b8cc3407be778f1c0c606eac"  # BYC
    name: "XCH/BYC"
    enabled: true
  - base_asset_id: "ae1536f56760e471ad85ead45f00d680ff9cca73b8cc3407be778f1c0c606eac"  # BYC
    quote_asset_id: "fa4a180ac326e67ea289b869e3448256f6af05721f7cf934cb9901baa6b7a99d"  # wUSDC.b
    name: "BYC/wUSDC.b"
    enabled: true
    # Per-pair strategy overrides for stablecoin-vs-stablecoin pair
    gamma_override: 0.003          # Lower risk aversion — tight spreads are safe
    phi_override: 0.15             # Hold ~50/50 balance, don't shed inventory
    min_profit_margin_bps_override: 12  # Tighter margin — DBX subsidy offsets
    tier_spacing_bps_override: [15, 30, 50, 80]  # Much tighter ladder
    tier_size_pct_override: [0.30, 0.25, 0.25, 0.20]
    # Stablecoin peg monitoring — both sides are USD-pegged
    is_stablecoin: true
    peg_target: 1.0                # Both BYC and wUSDC.b should be $1
    depeg_warn_pct: 2.0            # Warn at 2% deviation
    depeg_bail_pct: 10.0           # Pull all quotes at 10% deviation
    depeg_sustained_blocks: 30     # Must persist ~26 min before bail
  - base_asset_id: "f322a205c034fe28681829fa5a2e483ac421f0952eb1292945c8db06e0a471a6"  # wmilliETH.b
    quote_asset_id: "xch"
    name: "wmilliETH.b/XCH"
    enabled: true

strategy:
  # Avellaneda-Stoikov / GLFT parameters
  gamma: 0.01            # Risk aversion coefficient
  kappa: 1.5             # Fill intensity decay
  phi: 0.5               # Inventory skew strength (GLFT)
  q_max: 1000            # Max inventory in base units
  min_profit_margin_bps: 35  # Never post ask below cost_basis + this margin
  offer_ttl_blocks: 60       # Cancel stale offers after N blocks (~52 min)
  num_tiers: 4               # Multi-tier offer ladder depth
  tier_spacing_bps: [60, 120, 180, 240]  # Spread per tier (bps from mid) — must be ≤ max_half_spread_bps
  tier_size_pct: [0.30, 0.25, 0.25, 0.20] # Capital fraction per tier
  max_half_spread_bps: 250  # Global cap on half-spread (250 = 500bps round-trip = 5%)
  offer_fee_mojos: 100000000  # On-chain fee per offer/cancel (0.0001 XCH)
  # Startup market analysis: observe this many blocks before trading begins.
  # 0 = skip analysis and start trading immediately (default).
  # Example: 20 blocks (~17 min at 52 s/block).
  startup_analysis_blocks: 0

risk:
  # Inventory limits
  soft_limit_pct: 0.60   # Begin aggressive skewing
  hard_limit_pct: 0.80   # Pull quotes on overweight side
  single_cat_cap_pct: 0.12  # Max portfolio % in one CAT
  # Position sizing
  kelly_fraction: 0.5    # Half-Kelly
  max_capital_per_pair_pct: 0.20
  # Circuit breakers (all optional -- defaults shown)
  max_drawdown_pct: 0.10        # Pause when peak-to-trough PnL drop exceeds 10%
  loss_window_blocks: 1152      # Rolling window for time-window breaker (~10 h)
  max_window_loss_bps: 500      # Pause if this many bps lost within window; 0 = disabled

volatility:
  # Yang-Zhang hybrid estimator
  lookback_blocks: 200   # ~2.9 hours
  yz_alpha: 0.34         # Yang-Zhang optimal weight

monitoring:
  # Prometheus
  prometheus_port: 9090
  # Alerts (optional)
  telegram_bot_token: ""
  telegram_chat_id: ""

database:
  # SQLite for Phase 1, PostgreSQL later
  path: "data/xop_trader.db"

# Stablecoin depeg detection — global settings
# Per-pair thresholds are set in each pair's is_stablecoin / depeg_* fields.
depeg:
  enabled: true                    # Master switch for depeg monitoring
  default_warn_pct: 2.0            # Default warn threshold (% off peg)
  default_bail_pct: 10.0           # Default bail threshold (% off peg) — pull all quotes
  default_sustained_blocks: 30     # Deviation must persist N blocks before bail (~26 min)
  auto_disable_pair: true          # Automatically disable pair on bail-out
  alert_on_warn: true              # Send Telegram alert on peg warning
  alert_on_bail: true              # Send Telegram alert on bail-out

# Arbitrage detection — triangular, CEX-DEX, cross-DEX, cross-bridge
# All thresholds are in basis points (bps).  1 bps = 0.01%.
arbitrage:
  enabled: true                         # Master switch for arb scanning

  # Triangular arb (XCH -> A -> B -> XCH)
  triangular_min_profit_bps: 30         # Min net profit after all fees/slippage
  triangular_slippage_bps: 10           # Per-leg slippage estimate
  triangular_per_leg_fee_bps: 5         # Blockchain settlement fee per hop

  # CEX-DEX arb (dexie vs OKX/MEXC/Gate)
  cex_dex_min_edge_bps: 50              # Min raw edge to flag opportunity
  cex_dex_max_edge_bps: 500             # Reject edges above this (stale data)
  cex_fee_bps: 10                       # CEX taker fee (OKX VIP0 = 10)

  # Cross-DEX arb (dexie order book vs TibetSwap AMM)
  cross_dex_min_edge_bps: 15            # Lower — both legs are on-chain atomic
  tibetswap_fee_bps: 70                 # TibetSwap v2: 0.7%

  # Cross-bridge arb (wUSDC vs wUSDC.b)
  cross_bridge_min_edge_bps: 20         # Min divergence for same-underlying arb
  bridge_cost_bps: 15                   # warp.green bridge round-trip cost

  # General
  max_position_size: 100                # Max base-asset units per arb trade
  default_confidence: 0.75              # Base confidence when depth unknown
  min_confidence_threshold: 0.40        # Discard opportunities below this
